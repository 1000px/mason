# Mason Skill 模板
# runtime: python（默认）| javascript | shell
name: "example_skill"
display_name: "Example Skill"
version: "1.0.0"
author: "Your Name"
description: "A brief description of what this skill does."
runtime: python
entry_point: "main.py"

# Python Skill 不需要 parameters 字段，参数由 main.py 中的 Pydantic args_schema 定义
# JS/Shell Skill 需要在此定义参数：
# parameters:
#   city:
#     type: string
#     description: "城市名称"
#     required: true

requirements: []
permissions:
  network: false
  filesystem: true
  max_cpu: 0.5
  max_memory: 128